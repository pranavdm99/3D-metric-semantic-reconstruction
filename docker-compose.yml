services:
  # Base service - build this first
  base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: semantic-scene-base:latest
    profiles: ["build"]

  # Reconstruction: Neural Reconstruction & Surface Alignment
  reconstruction:
    build:
      context: .
      dockerfile: docker/Dockerfile.reconstruction
    image: semantic-scene-reconstruction-reconstruction:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
    volumes:
      - ./data:/workspace/data
      - ./src:/workspace/src
      - ./configs:/workspace/configs
      - ./scripts:/workspace/scripts
    shm_size: '4gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Segmentation: Semantic Grounding & 3D Segmentation
  segmentation:
    build:
      context: .
      dockerfile: docker/Dockerfile.segmentation
    image: semantic-scene-reconstruction-segmentation:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - OLLAMA_MODELS=/workspace/data/checkpoints/ollama
    volumes:
      - ./data:/workspace/data
      - ./src:/workspace/src
      - ./configs:/workspace/configs
      - ./scripts:/workspace/scripts
    shm_size: '4gb'
    ports:
      - "11434:11434"  # Ollama API
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  default:
    driver: bridge
